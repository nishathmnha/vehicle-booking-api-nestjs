services:
  db:
    image: postgres:16-alpine
    container_name: vehicle-booking-db
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-vehicle_booking}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-vehicle_booking}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: vehicle-booking-api
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:3000"
    restart: unless-stopped

volumes:
  postgres_data:

